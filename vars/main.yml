user: jhowe
group: jhowe
home_directory: /home/jhowe
tempdir: /tmp

desktop_session_required: true
downloads_migrate_existing: true
docker_add_user_to_group: true

btsync_root: "{{ home_directory }}/storage/btsync"
btsync_folder_root: "{{ btsync_root }}/folders"

applications:
  - name: signal-desktop
    repo: "deb [arch=amd64] https://updates.signal.org/desktop/apt xenial main"
    key_url: https://updates.signal.org/desktop/apt/keys.asc

snaps_classic:
  - code
  - powershell

snaps_regular:
  - brave
  - drawing
  - remmina
  - plex-desktop
  - bitwarden

apt_packages:
  - vim
  - tilda
  - docker.io
  - docker-compose
  - curl
  - plank
  - moreutils
  - neofetch
  - dkms
  - displaylink-driver
  - libglib2.0-dev-bin
  - gdm-settings
  - gnupg
  - ca-certificates
  - flameshot
  - pipx
  - python3-venv
  - python3-psutil

pipx_packages: []

directories:
  - "{{ btsync_folder_root }}/britt-jon"
  - "{{ btsync_folder_root }}/DCIM"
  - "{{ btsync_folder_root }}/Images"
  - "{{ btsync_folder_root }}/Downloads"
  - "{{ btsync_folder_root }}/Work/Customers"
  - "{{ btsync_folder_root }}/Sync/Screenshots"
  - "{{ home_directory }}/Docker"
  - "{{ home_directory }}/git"

resilio_sync:
  image: resilio/sync
  name: Sync
  webui_port: "8888"
  peer_port: "5555"
  btsync_root: "{{ btsync_root }}"
  mem_limit: 128m
  cpus: "0.5"
  restart_policy: unless-stopped
  manage_user_mapping: true

bookmarks:
  - path: "{{ btsync_folder_root }}"
    name: Sync
  - path: "{{ btsync_folder_root }}/Sync/Screenshots"
    name: Screenshots
  - path: "{{ home_directory }}/git"
    name: Git

gsettings:
  - schema: org.gnome.desktop.interface
    key: clock-show-weekday
    value: "true"
  - schema: org.gnome.desktop.interface
    key: clock-format
    value: "'12h'"
  - schema: org.gnome.shell.extensions.dash-to-dock
    key: show-mounts
    value: "false"
  - schema: org.gnome.desktop.background
    key: color-shading-type
    value: "'solid'"
  - schema: org.gnome.desktop.background
    key: picture-options
    value: "'zoom'"
  - schema: org.gnome.desktop.background
    key: picture-uri
    value: "'file:///usr/share/backgrounds/Fuji_san_by_amaral.png'"
  - schema: org.gnome.desktop.background
    key: picture-uri-dark
    value: "'file:///usr/share/backgrounds/Fuji_san_by_amaral.png'"
  - schema: org.gnome.desktop.background
    key: primary-color
    value: "'#000000'"
  - schema: org.gnome.desktop.background
    key: secondary-color
    value: "'#000000'"

flameshot_command: "flameshot gui -p {{ btsync_root }}/folders/Sync/Screenshots/"

keybindings:
  - key: /org/gnome/settings-daemon/plugins/media-keys/screenshot
    value: "['disabled']"
  - key: /org/gnome/settings-daemon/plugins/media-keys/custom-keybindings
    value: "['/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0']"
  - key: /org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/name
    value: "'Flameshot Screenshot'"
  - key: /org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/command
    value: "'{{ flameshot_command }}'"
  - key: /org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/binding
    value: "'Print'"

git_user_name: Jon Howe
git_user_email: howe.jon@gmail.com

joplin:
  enabled: true
  install_method: snap
  snap_name: joplin-desktop
  classic: false
  channel: stable

zoom:
  enabled: true
  install_method: snap
  snap_name: zoom-client
  classic: false
  channel: stable

rambox:
  enabled: true
  install_method: snap
  snap_name: rambox
  classic: false
  channel: stable
