user: "{{ lookup('ansible.builtin.env', 'USER') }}"
group: "{{ lookup('ansible.builtin.env', 'USER') }}"
home_directory: "{{ lookup('ansible.builtin.env', 'HOME') }}"
tempdir: /tmp

desktop_session_required: true
downloads_migrate_existing: true
docker_add_user_to_group: true

btsync_root: "{{ home_directory }}/storage/btsync"
btsync_folder_root: "{{ btsync_root }}/folders"

applications:
  - name: signal-desktop
    repo: "deb [arch=amd64] https://updates.signal.org/desktop/apt xenial main"
    key_url: https://updates.signal.org/desktop/apt/keys.asc

snaps_classic:
  - code
  - powershell
  - ghostty

snaps_regular:
  - brave
  - drawing
  - remmina
  - plex-desktop
  - bitwarden

apt_packages:
  - vim
  - tilda
  - gnome-terminal
  - docker.io
  - docker-compose
  - curl
  - plank
  - moreutils
  - neofetch
  - dkms
  - displaylink-driver
  - libglib2.0-dev-bin
  - gdm-settings
  - gnupg
  - ca-certificates
  - flameshot
  - pipx
  - python3-venv
  - python3-psutil

pipx_packages: []

directories:
  - "{{ btsync_folder_root }}/shared"
  - "{{ btsync_folder_root }}/DCIM"
  - "{{ btsync_folder_root }}/Images"
  - "{{ btsync_folder_root }}/Downloads"
  - "{{ btsync_folder_root }}/Work/Customers"
  - "{{ btsync_folder_root }}/Sync/Screenshots"
  - "{{ home_directory }}/Docker"
  - "{{ home_directory }}/git"

resilio_sync:
  image: resilio/sync
  name: Sync
  webui_port: "8888"
  peer_port: "5555"
  btsync_root: "{{ btsync_root }}"
  mem_limit: 128m
  cpus: "0.5"
  restart_policy: unless-stopped
  manage_user_mapping: true

bookmarks:
  - path: "{{ btsync_folder_root }}"
    name: Sync
  - path: "{{ btsync_folder_root }}/Sync/Screenshots"
    name: Screenshots
  - path: "{{ home_directory }}/git"
    name: Git

gsettings:
  - schema: org.gnome.desktop.interface
    key: clock-show-weekday
    value: "true"
  - schema: org.gnome.desktop.interface
    key: clock-format
    value: "'12h'"
  - schema: org.gnome.shell.extensions.dash-to-dock
    key: show-mounts
    value: "false"
  - schema: org.gnome.desktop.background
    key: color-shading-type
    value: "'solid'"
  - schema: org.gnome.desktop.background
    key: picture-options
    value: "'zoom'"
  - schema: org.gnome.desktop.background
    key: picture-uri
    value: "'file:///usr/share/backgrounds/Fuji_san_by_amaral.png'"
  - schema: org.gnome.desktop.background
    key: picture-uri-dark
    value: "'file:///usr/share/backgrounds/Fuji_san_by_amaral.png'"
  - schema: org.gnome.desktop.background
    key: primary-color
    value: "'#000000'"
  - schema: org.gnome.desktop.background
    key: secondary-color
    value: "'#000000'"

gnome_favorite_apps_remove:
  - firefox.desktop
  - firefox_firefox.desktop
  - yelp.desktop
  - org.gnome.Help.desktop
  - org.gnome.Software.desktop
  - snap-store_snap-store.desktop
  - ubuntu-app-center_ubuntu-app-center.desktop

gnome_favorite_apps_add:
  - name: brave
    desktop_ids:
      - brave_brave.desktop
      - brave-browser.desktop
      - brave.desktop

gnome_terminal_profile_settings:
  - key: use-theme-colors
    value: "false"
  - key: foreground-color
    value: "'rgb(230,234,238)'"
  - key: use-transparent-background
    value: "true"
  - key: background-transparency-percent
    value: "8"
  - key: background-color
    value: "'rgb(24,28,34)'"

ghostty_config:
  foreground: e6eaee
  background: 181c22
  background_opacity: "0.92"
  background_opacity_cells: "true"

ghostty_desktop_ids:
  - com.mitchellh.ghostty.desktop
  - ghostty.desktop
  - ghostty_ghostty.desktop

flameshot_command: "flameshot gui -p {{ btsync_root }}/folders/Sync/Screenshots/"

keybindings:
  - key: /org/gnome/settings-daemon/plugins/media-keys/screenshot
    value: "['disabled']"
  - key: /org/gnome/settings-daemon/plugins/media-keys/custom-keybindings
    value: "['/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0']"
  - key: /org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/name
    value: "'Flameshot Screenshot'"
  - key: /org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/command
    value: "'{{ flameshot_command }}'"
  - key: /org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/binding
    value: "'Print'"

git_user_name: Example User
git_user_email: user@example.com

optional_snap_applications:
  - name: joplin
    enabled: true
    install_method: snap
    snap_name: joplin-desktop
    classic: false
    channel: stable
  - name: zoom
    enabled: true
    install_method: snap
    snap_name: zoom-client
    classic: false
    channel: stable
  - name: rambox
    enabled: true
    install_method: snap
    snap_name: rambox
    classic: false
    channel: stable
