---
- name: Bootstrap Ubuntu workstation system configuration
  hosts: localhost
  connection: local
  gather_facts: true
  become: true

  vars_files:
    - vars/main.yml

  pre_tasks:
    - name: Check for local override file
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/.env.yml"
      register: override_file

    - name: Load local overrides from .env.yml
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/.env.yml"
      when: override_file.stat.exists

  roles:
    - role: preflight
      vars:
        preflight_gui_required: true
      tags: ["always"]
    - {role: preflight, tags: ["always"], vars: {preflight_gui_required: true}}
    - {role: install_applications, tags: ["base", "apps"]}
    - {role: apt_packages, tags: ["base", "apps"]}
    - {role: install_node_tools, tags: ["base", "apps"]}
    - {role: setup_docker, tags: ["docker"]}
    - {role: setup_resilio_sync, tags: ["apps"]}

- name: Apply logged-in user GUI customization
  hosts: localhost
  connection: local
  gather_facts: true
  become: false

  vars_files:
    - vars/main.yml

  pre_tasks:
    - name: Check for local override file
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/.env.yml"
      register: override_file

    - name: Load local overrides from .env.yml
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/.env.yml"
      when: override_file.stat.exists

  roles:
    - role: preflight
      vars:
        preflight_gui_required: true
      tags: ["always"]
    - {role: create_directories, tags: ["base"]}
    - {role: configure_git, tags: ["base"]}
    - {role: install_python_tools, tags: ["base", "apps"]}
    - {role: configure_opencode, tags: ["base", "apps"]}
    - {role: update_user_dirs, tags: ["base"]}
    - {role: configure_gnome, tags: ["customization"]}
    - {role: setup_flameshot, tags: ["apps", "customization"]}
