---
- name: Ensure local bin directory exists
  ansible.builtin.file:
    path: "{{ home_directory }}/.local/bin"
    state: directory
    owner: "{{ user }}"
    group: "{{ group }}"
    mode: "0755"

- name: Create Flameshot startup script for Wayland
  ansible.builtin.copy:
    dest: "{{ home_directory }}/.local/bin/start-flameshot-wayland.sh"
    owner: "{{ user }}"
    group: "{{ group }}"
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      export QT_QPA_PLATFORM=wayland
      exec flameshot

- name: Ensure autostart directory exists
  ansible.builtin.file:
    path: "{{ home_directory }}/.config/autostart"
    state: directory
    owner: "{{ user }}"
    group: "{{ group }}"
    mode: "0755"

- name: Create Flameshot autostart entry
  ansible.builtin.copy:
    dest: "{{ home_directory }}/.config/autostart/flameshot.desktop"
    owner: "{{ user }}"
    group: "{{ group }}"
    mode: "0644"
    content: |
      [Desktop Entry]
      Type=Application
      Exec={{ home_directory }}/.local/bin/start-flameshot-wayland.sh
      Hidden=false
      NoDisplay=false
      X-GNOME-Autostart-enabled=true
      Name=Flameshot
      Comment=Start Flameshot with Wayland support

- name: Set custom keybindings for Flameshot
  community.general.dconf:
    key: "{{ item.key }}"
    value: "{{ item.value }}"
  loop: "{{ keybindings }}"
  environment: "{{ gui_session_environment }}"
