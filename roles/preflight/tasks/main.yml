---
- name: Gather active desktop session facts without privilege escalation
  ansible.builtin.setup:
    gather_subset:
      - min
    filter:
      - ansible_env
      - ansible_user_id
      - ansible_user_uid
      - ansible_user_gid
  become: false
  register: preflight_session_setup

- name: Cache active desktop session details
  ansible.builtin.set_fact:
    active_session_user_id: "{{ preflight_session_setup.ansible_facts.ansible_user_id }}"
    active_session_user_uid: "{{ preflight_session_setup.ansible_facts.ansible_user_uid }}"
    active_session_user_gid: "{{ preflight_session_setup.ansible_facts.ansible_user_gid }}"
    active_session_env: "{{ preflight_session_setup.ansible_facts.ansible_env }}"

- name: Assert this playbook is running locally on Ubuntu
  ansible.builtin.assert:
    that:
      - ansible_connection == "local"
      - ansible_os_family == "Debian"
      - ansible_distribution == "Ubuntu"
    fail_msg: >-
      This playbook only supports a local Ubuntu workstation session.

- name: Assert required workstation variables are set
  ansible.builtin.assert:
    that:
      - user | length > 0
      - group | length > 0
      - home_directory | length > 0
    fail_msg: >-
      Required workstation variables are missing. Update vars/main.yml or .env.yml.

- name: Assert the configured home directory matches the active login user
  ansible.builtin.assert:
    that:
      - active_session_user_id == user
      - active_session_env.HOME == home_directory
    fail_msg: >-
      The configured user/home do not match the active login session. Update .env.yml or launch this playbook as {{ user }}.

- name: Assert a GUI session is present when desktop tasks are enabled
  ansible.builtin.assert:
    that:
      - not (desktop_session_required | bool and preflight_gui_required | bool) or active_session_env.DISPLAY is defined or active_session_env.WAYLAND_DISPLAY is defined
      - not (desktop_session_required | bool and preflight_gui_required | bool) or active_session_env.XDG_RUNTIME_DIR is defined
    fail_msg: >-
      This playbook only supports a logged-in GUI session. Launch it from the active desktop session, not a headless shell.

- name: Build GUI session environment for user-level desktop tools
  ansible.builtin.set_fact:
    gui_session_environment: >-
      {{
        {
          'HOME': home_directory,
          'XDG_RUNTIME_DIR': active_session_env.XDG_RUNTIME_DIR,
          'DBUS_SESSION_BUS_ADDRESS': active_session_env.DBUS_SESSION_BUS_ADDRESS | default('unix:path=' ~ active_session_env.XDG_RUNTIME_DIR ~ '/bus')
        }
        | combine((active_session_env.DISPLAY is defined) | ternary({'DISPLAY': active_session_env.DISPLAY}, {}))
        | combine((active_session_env.WAYLAND_DISPLAY is defined) | ternary({'WAYLAND_DISPLAY': active_session_env.WAYLAND_DISPLAY}, {}))
        | combine((active_session_env.XDG_CURRENT_DESKTOP is defined) | ternary({'XDG_CURRENT_DESKTOP': active_session_env.XDG_CURRENT_DESKTOP}, {}))
      }}
  when:
    - desktop_session_required | bool
    - active_session_env.XDG_RUNTIME_DIR is defined
